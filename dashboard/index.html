<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPS Vehicle Tracker</title>

  <!-- Leaflet.js (free, no API key needed) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1d27;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2d3148;
    }

    header .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    header h1 { font-size: 1.2rem; font-weight: 600; }
    header .subtitle { font-size: 0.8rem; color: #94a3b8; margin-left: auto; }

    .stats-bar {
      background: #1a1d27;
      display: flex;
      gap: 1px;
      border-bottom: 1px solid #2d3148;
    }

    .stat {
      flex: 1;
      padding: 12px 20px;
      background: #1a1d27;
      text-align: center;
    }

    .stat:not(:last-child) { border-right: 1px solid #2d3148; }

    .stat .label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 4px;
    }

    .stat .value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #38bdf8;
      font-variant-numeric: tabular-nums;
    }

    .stat .value.speed { color: #f472b6; }
    .stat .value.time  { color: #a78bfa; font-size: 0.85rem; }

    #map {
      flex: 1;
    }

    #status-bar {
      background: #1a1d27;
      padding: 6px 16px;
      font-size: 0.73rem;
      color: #64748b;
      border-top: 1px solid #2d3148;
      display: flex;
      justify-content: space-between;
    }

    #status-msg.ok  { color: #22c55e; }
    #status-msg.err { color: #f87171; }
    #status-msg.wait { color: #fbbf24; }
  </style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>GPS Vehicle Tracker</h1>
  <span class="subtitle">NodeMCU + NEO-6M &nbsp;|&nbsp; Live Map</span>
</header>

<div class="stats-bar">
  <div class="stat">
    <div class="label">Latitude</div>
    <div class="value" id="stat-lat">—</div>
  </div>
  <div class="stat">
    <div class="label">Longitude</div>
    <div class="value" id="stat-lng">—</div>
  </div>
  <div class="stat">
    <div class="label">Speed (km/h)</div>
    <div class="value speed" id="stat-speed">—</div>
  </div>
  <div class="stat">
    <div class="label">Last Update</div>
    <div class="value time" id="stat-time">—</div>
  </div>
</div>

<div id="map"></div>

<div id="status-bar">
  <span id="status-msg" class="wait">Waiting for first GPS fix...</span>
  <span id="refresh-countdown">Refreshing in 5s</span>
</div>

<script>
  // ── Map init ─────────────────────────────────────────────────────────────
  const map = L.map('map').setView([20.5937, 78.9629], 5); // India center default

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);

  const vehicleIcon = L.divIcon({
    className: '',
    html: `<div style="
      width:18px; height:18px;
      background:#38bdf8;
      border:3px solid #fff;
      border-radius:50%;
      box-shadow:0 0 8px #38bdf8aa;
    "></div>`,
    iconSize:   [18, 18],
    iconAnchor: [9, 9]
  });

  let marker    = null;
  let firstFix  = true;
  let countdown = 5;

  // ── Fetch latest GPS data ─────────────────────────────────────────────────
  async function fetchLocation() {
    try {
      const res = await fetch('/location');

      if (res.status === 404) {
        setStatus('wait', 'No GPS data yet. Waiting for NodeMCU...');
        return;
      }

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const d = await res.json();
      const lat   = parseFloat(d.latitude);
      const lng   = parseFloat(d.longitude);
      const speed = parseFloat(d.speed).toFixed(1);

      // Update stats
      document.getElementById('stat-lat').textContent   = lat.toFixed(6);
      document.getElementById('stat-lng').textContent   = lng.toFixed(6);
      document.getElementById('stat-speed').textContent = speed;
      document.getElementById('stat-time').textContent  = d.timestamp + ' UTC';

      // Update marker
      if (!marker) {
        marker = L.marker([lat, lng], { icon: vehicleIcon }).addTo(map);
      } else {
        marker.setLatLng([lat, lng]);
      }

      marker.bindPopup(
        `<b>Vehicle</b><br>` +
        `Lat: ${lat.toFixed(6)}<br>` +
        `Lng: ${lng.toFixed(6)}<br>` +
        `Speed: ${speed} km/h`
      );

      if (firstFix) {
        map.setView([lat, lng], 15);
        firstFix = false;
      }

      setStatus('ok', 'Live — receiving GPS data from vehicle.');
    } catch (err) {
      setStatus('err', 'Cannot reach server: ' + err.message);
    }
  }

  function setStatus(type, msg) {
    const el = document.getElementById('status-msg');
    el.className = type;
    el.textContent = msg;
  }

  // ── Auto-refresh every 5 s ────────────────────────────────────────────────
  function startCountdown() {
    countdown = 5;
    const el = document.getElementById('refresh-countdown');
    const timer = setInterval(() => {
      countdown--;
      el.textContent = `Refreshing in ${countdown}s`;
      if (countdown <= 0) {
        clearInterval(timer);
        fetchLocation().then(startCountdown);
      }
    }, 1000);
  }

  fetchLocation().then(startCountdown);
</script>

</body>
</html>
